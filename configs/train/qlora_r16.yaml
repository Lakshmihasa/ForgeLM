# Training run: Llama-3-8B QLoRA, LoRA rank 16.
#
#   python scripts/train.py --config configs/train/qlora_r16.yaml
#
# Rank ablation (reuse this file, override on the CLI):
#   python scripts/train.py --config configs/train/qlora_r16.yaml \
#     --set qlora.r=32 qlora.lora_alpha=64 \
#           train.output_dir=outputs/llama3-8b-qlora-r32 train.run_name=r32
#
# Self-contained: any qlora field not set here uses the QLoRAConfig default,
# which matches configs/model/llama3.yaml. Compose with that file for a
# non-default model setup.

qlora:
  model_name: meta-llama/Meta-Llama-3-8B-Instruct
  r: 16
  lora_alpha: 32          # scaling = lora_alpha / r = 2.0
  lora_dropout: 0.05

train:
  output_dir: outputs/llama3-8b-qlora-r16
  num_train_epochs: 3.0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4      # effective batch = 4 * 4 = 16
  learning_rate: 0.0002               # 2e-4, standard QLoRA LR
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 0.3
  max_seq_length: 1024
  optim: paged_adamw_8bit
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  metric_for_best_model: eval_loss    # see trainer.py note on EX-based selection
  greater_is_better: false
  seed: 13
  report_to: wandb
  run_name: llama3-8b-qlora-r16

data:
  tables: data/raw/spider/tables.json
  train_jsonl: data/processed/train.jsonl
  val_jsonl: data/processed/val.jsonl

  # FROZEN schema-serialization contract.
  # This block MUST be byte-identical in configs/eval.yaml and at serve time —
  # it is the whole train/eval/serve parity contract. Ideally factor it into a
  # shared configs/data.yaml and reference from both.
  serialize_kwargs:
    include_types: true
    include_primary_keys: true
    include_foreign_keys: true
    # sample_values off by default (would expose real data to the model)

  # Only used when training with --ex-eval (periodic execution accuracy on val).
  db_root: data/raw/spider/database
  test_suite_root: null